name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔍 DEBUG: shows what project files actually exist
      - name: List all .csproj files
        run: dir /s *.csproj

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: '17'

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore dependencies
        run: dotnet restore VR-SportTraining.sln

      - name: Begin SonarCloud analysis
        run: >
          dotnet sonarscanner begin
          /k:"Caleb-Kendig_VR-SportTraining"
          /o:"caleb-kendig"
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.exclusions=**/Library/**,**/Temp/**,**/obj/**,**/*.meta
          /d:sonar.dotnet.excludeGeneratedCode=true

      - name: Build solution
        run: dotnet build VR-SportTraining.sln --no-restore

      - name: End SonarCloud analysis
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
